# Extra env variables
# env = MY_GLOBAL_ENV,setting

env = OMARCHY_SCREENSHOT_DIR, $HOME/screenshots

# Override omarchy default: SDL3 (used by Xalia/Proton) does not support SDL2's
# comma-separated fallback syntax "wayland,x11" and crashes with it.
env = SDL_VIDEODRIVER, wayland

opengl {
    nvidia_anti_flicker = true
}

render {
    direct_scanout = 0
}

xwayland {
    force_zero_scaling = true
}

